        searchResults.hidden = false;
        if (!hits.length) {
            searchResults.innerHTML = '<div class="search-empty">没有找到匹配的文章</div>';
            return;
        }
        searchResults.innerHTML = hits.slice(0, 24).map(item => {
            const u = String(item.url || '#').replace(/"/g, '');
            const snip = escHtml(stripHtml(item.content || '').slice(0, 80));
            const title = escHtml(item.title || '无标题');
            return '<a class="search-hit" href="' + u + '">' + title +
                (snip ? '<small>' + snip + '…</small>' : '') + '</a>';
        }).join('');
    }

    fetch(hexoRoot + 'search.json', { credentials: 'same-origin' }).then(r => {
        if (!r.ok) throw new Error('search.json');
        return r.json();
    }).then(data => {
        searchData = data;
    }).catch(() => {
        if (searchResults) {
            searchResults.hidden = false;
            searchResults.innerHTML = '<div class="search-empty">搜索索引未生成，请先执行 hexo generate</div>';
        }
    });

    let searchTimer;
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => runSearch(searchInput.value), 200);
        });
    }
    if (searchForm) {
        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            runSearch(searchInput ? searchInput.value : '');
        });
    }
    if (searchBtn) {
        searchBtn.addEventListener('click', (e) => {
            e.preventDefault();
            runSearch(searchInput ? searchInput.value : '');
        });
    }

    // ================= 1. UI 中枢系统 (FAB 控制) =================
    const fabContainer = document.getElementById('fabContainer');
    const btnMain = document.getElementById('btnMain');
    const musicPanel = document.getElementById('musicPanel');

    if (btnMain && fabContainer) {
        btnMain.addEventListener('click', () => {
            fabContainer.classList.toggle('open');
            btnMain.style.transform = fabContainer.classList.contains('open') ? 'rotate(45deg)' : 'rotate(0)';
            if (!fabContainer.classList.contains('open') && musicPanel) {
                musicPanel.classList.remove('active');
            }
        });
    }

    const btnFx = document.getElementById('btnFx');
    if (btnFx) {
        if (fxOff) btnFx.classList.add('fab-inactive');
        btnFx.addEventListener('click', () => {
            try {
                const offNow = document.documentElement.classList.contains('prts-fx-off');
                if (offNow) {
                    document.documentElement.classList.remove('prts-fx-off');
                    localStorage.setItem('prts-fx', '1');
                } else {
                    document.documentElement.classList.add('prts-fx-off');
                    localStorage.setItem('prts-fx', '0');
                }
            } catch (e) { /* ignore */ }
            window.location.reload();
        });
    }

    document.querySelectorAll('.game-id-copy').forEach(btn => {
        btn.addEventListener('click', () => {
            const t = btn.getAttribute('data-copy') || '';
            if (!t) return;
            navigator.clipboard.writeText(t).then(() => {
                const o = btn.textContent;
                btn.textContent = '✓';
                setTimeout(() => { btn.textContent = o; }, 1200);
            }).catch(() => {});
        });
    });

    const btnTheme = document.getElementById('btnTheme');
    let currentTheme = 'dark';
    function setTheme(theme) {
        currentTheme = theme;
        document.body.setAttribute('data-theme', theme);
    }
    function autoTheme() {
        const hour = new Date().getHours();
        setTheme((hour >= 6 && hour < 18) ? 'light' : 'dark');
    }
    autoTheme();
    if (btnTheme) btnTheme.addEventListener('click', () => { setTheme(currentTheme === 'dark' ? 'light' : 'dark'); });

    // ================= 2. 音乐通讯终端 =================
    const playlist = [
        { name: "01. 生命流「熠曲丰碑」-2025音律联觉ver.", src: hexoRoot + "music/生命流「熠曲丰碑」-2025音律联觉.mp3" },
        { name: "02. 櫂", src: hexoRoot + "music/ヨルシカ - 櫂.mp3" },
        { name: "03. ヰ世界の宝石譚", src: hexoRoot + "music/ヰ世界の宝石譚.mp3" },
        { name: "04. KAWAIIめたもる交響曲", src: hexoRoot + "music/KAWAIIめたもる交響曲.mp3" }
    ];
    let currentTrackIndex = 0;
    const audio = new Audio();
    const btnMusic = document.getElementById('btnMusic');
    const mpPlayPause = document.getElementById('mpPlayPause');
    const mpPlaylistUI = document.getElementById('mpPlaylistUI');

    if (btnMusic && musicPanel) {
        btnMusic.addEventListener('click', () => { musicPanel.classList.toggle('active'); });

        if (mpPlaylistUI) {
            playlist.forEach((track, index) => {
                const li = document.createElement('li');
                li.textContent = track.name;
                li.onclick = () => loadTrack(index, true);
                mpPlaylistUI.appendChild(li);
            });
        }

        const MPK = { idx: 'prts-mp-idx', time: 'prts-mp-time', playing: 'prts-mp-playing' };
        const MPV = 'prts-mp-volume';
        let persistMpTimer = 0;

        const mpVolumeBar = document.getElementById('mpVolumeBar');
        function applyVolume(v) {
            let x = parseFloat(v);
            if (Number.isNaN(x)) x = 0.85;
            x = Math.max(0, Math.min(1, x));
            audio.volume = x;
            if (mpVolumeBar) mpVolumeBar.value = String(x);
            try { localStorage.setItem(MPV, String(x)); } catch (e) { /* ignore */ }
        }
        try {
            const sv = localStorage.getItem(MPV);
            if (sv != null && sv !== '') applyVolume(sv);
            else applyVolume(0.85);
        } catch (e) {
            applyVolume(0.85);
        }
        if (mpVolumeBar) {
            mpVolumeBar.addEventListener('input', () => applyVolume(mpVolumeBar.value));
        }

        function persistMp() {
            try {
                sessionStorage.setItem(MPK.idx, String(currentTrackIndex));
                sessionStorage.setItem(MPK.time, String(audio.currentTime || 0));
                sessionStorage.setItem(MPK.playing, audio.paused ? '0' : '1');
            } catch (e) { /* ignore */ }
        }

        function loadTrack(index, autoPlay = false) {
            if (playlist.length === 0) return;
            currentTrackIndex = index;
            audio.src = playlist[index].src;
            const mpTitle = document.getElementById('mpTitle');
            if (mpTitle) mpTitle.textContent = playlist[index].name;

            if (mpPlaylistUI) {
                const items = mpPlaylistUI.querySelectorAll('li');
                items.forEach(item => item.classList.remove('playing'));
                if (items[index]) items[index].classList.add('playing');
            }
            if (autoPlay) togglePlay(true);
            persistMp();
        }

        function togglePlay(forcePlay = false) {
            if (audio.paused || forcePlay) {
                audio.play().then(() => {
                    if (mpPlayPause) mpPlayPause.textContent = "⏸";
                    btnMusic.classList.add('btn-playing');
                    persistMp();
                }).catch(() => {
                    if (mpPlayPause) mpPlayPause.textContent = "▶";
                    btnMusic.classList.remove('btn-playing');
                    persistMp();
                });
            } else {
                audio.pause();
                if (mpPlayPause) mpPlayPause.textContent = "▶";
                btnMusic.classList.remove('btn-playing');
                persistMp();
            }
        }

        if (mpPlayPause) mpPlayPause.addEventListener('click', () => togglePlay());
        const mpPrev = document.getElementById('mpPrev');
        const mpNext = document.getElementById('mpNext');
        if (mpPrev) mpPrev.addEventListener('click', () => { let newIndex = currentTrackIndex - 1; if (newIndex < 0) newIndex = playlist.length - 1; loadTrack(newIndex, true); });
        if (mpNext) mpNext.addEventListener('click', () => { let newIndex = currentTrackIndex + 1; if (newIndex >= playlist.length) newIndex = 0; loadTrack(newIndex, true); });
        audio.addEventListener('ended', () => { if (mpNext) mpNext.click(); });

        const mpProgressBar = document.getElementById('mpProgressBar');
        const mpTimeCurrent = document.getElementById('mpTimeCurrent');
        const mpTimeTotal = document.getElementById('mpTimeTotal');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        audio.addEventListener('loadedmetadata', () => {
            if (mpTimeTotal) mpTimeTotal.textContent = formatTime(audio.duration);
            if (mpProgressBar) mpProgressBar.max = audio.duration;
        });

        let isDragging = false;
        audio.addEventListener('timeupdate', () => {
            if (mpTimeCurrent) mpTimeCurrent.textContent = formatTime(audio.currentTime);
            if (!isDragging && mpProgressBar) mpProgressBar.value = audio.currentTime;
            const t = Date.now();
            if (t - persistMpTimer > 900) {
                persistMpTimer = t;
                persistMp();
            }
        });

        audio.addEventListener('pause', persistMp);
        audio.addEventListener('play', persistMp);
        window.addEventListener('pagehide', persistMp);

        function resumeIfUserLeftPlaying() {
            try {
                if (sessionStorage.getItem(MPK.playing) !== '1') return;
                if (!audio.src) return;
                if (audio.paused) {
                    audio.play().then(() => {
                        if (mpPlayPause) mpPlayPause.textContent = '⏸';
                        btnMusic.classList.add('btn-playing');
                    }).catch(() => {});
                }
            } catch (e) { /* ignore */ }
        }
        window.addEventListener('pageshow', () => { resumeIfUserLeftPlaying(); });
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) resumeIfUserLeftPlaying();
        });
        document.addEventListener('pointerdown', resumeIfUserLeftPlaying, { capture: true, passive: true });

        if (mpProgressBar) {
            mpProgressBar.addEventListener('mousedown', () => { isDragging = true; });
            mpProgressBar.addEventListener('mouseup', () => { isDragging = false; audio.currentTime = mpProgressBar.value; persistMp(); });
            mpProgressBar.addEventListener('touchstart', () => { isDragging = true; });
            mpProgressBar.addEventListener('touchend', () => { isDragging = false; audio.currentTime = mpProgressBar.value; persistMp(); });
        }

        let restored = false;
        try {
            const si = sessionStorage.getItem(MPK.idx);
            const st = sessionStorage.getItem(MPK.time);
            const sp = sessionStorage.getItem(MPK.playing);
            if (si != null && si !== '') {
                const idx = parseInt(si, 10);
                if (idx >= 0 && idx < playlist.length) {
                    loadTrack(idx, false);
                    const seek = parseFloat(st);
                    const applySeek = () => {
                        if (!isNaN(seek) && seek > 0 && audio.duration && seek < audio.duration - 0.5) {
                            audio.currentTime = seek;
                        }
                    };
                    audio.addEventListener('loadedmetadata', applySeek, { once: true });
                    applySeek();
                    restored = true;
                    if (sp === '1') {
                        const tryResume = () => { togglePlay(true); };
                        if (audio.readyState >= 2) tryResume();
                        else audio.addEventListener('canplay', tryResume, { once: true });
                    }
                }
            }
        } catch (e) { /* ignore */ }
        if (!restored) loadTrack(0, false);
    }

    // ================= 3. 全屏背景飘浮粒子 =================
    const bgCanvas = document.getElementById('global-bg-particles');
    if (bgCanvas && !fxOff && !prtsLowFx) {
        const bctx = bgCanvas.getContext('2d');
        const floats = [];
        const N = prtsLowFx ? 52 : 96;

        function resizeBg() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        resizeBg();
        window.addEventListener('resize', resizeBg);

        for (let i = 0; i < N; i++) {
            floats.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 1.65 + 0.45,
                vx: (Math.random() - 0.5) * 0.22,
                vy: (Math.random() - 0.5) * 0.22,
                ph: Math.random() * Math.PI * 2,
                a: Math.random() * 0.42 + 0.2
            });
        }

        let bgLast = 0;
        const bgFrameMs = prtsLowFx ? 70 : 28;
        function tickBg(now) {
            requestAnimationFrame(tickBg);
            if (document.hidden) return;
            if (now - bgLast < bgFrameMs) return;
            bgLast = now;
            bctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            const light = document.body.getAttribute('data-theme') === 'light';
            const t = now / 1000;
            floats.forEach((p, i) => {
                p.x += p.vx + Math.sin(t * 0.65 + p.ph + i) * 0.1;
                p.y += p.vy + Math.cos(t * 0.5 + p.ph) * 0.08;
                if (p.x < -20) p.x = bgCanvas.width + 20;
                if (p.x > bgCanvas.width + 20) p.x = -20;
                if (p.y < -20) p.y = bgCanvas.height + 20;
                if (p.y > bgCanvas.height + 20) p.y = -20;
                const alphaBoost = light ? 1.15 : 1.25;
                bctx.fillStyle = light ? 'rgba(0,100,200,' + Math.min(1, p.a * alphaBoost) + ')' : 'rgba(0,212,255,' + Math.min(1, p.a * alphaBoost) + ')';
                bctx.beginPath();
                bctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                bctx.fill();
            });
        }
        requestAnimationFrame(tickBg);
    }

    // ================= 4. 右下角 Logo 粒子（与 FAB 同栈） =================
    const canvas = document.getElementById('particle-canvas');
    const logoHolder = document.getElementById('logoCorner');
    if (canvas && logoHolder && !fxOff) {
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null };
        const repelRadius = 22;
        let trailX = null;
        let trailY = null;
        let prevTrailX = null;
        let prevTrailY = null;

        function initCanvas() {
            canvas.width = logoHolder.clientWidth;
            canvas.height = logoHolder.clientHeight;
            trailX = trailY = prevTrailX = prevTrailY = null;
        }
        initCanvas();
        window.addEventListener('resize', initCanvas);

        function distParticleToSegment(px, py, ax, ay, bx, by) {
            const abx = bx - ax;
            const aby = by - ay;
            const abLen2 = abx * abx + aby * aby;
            if (abLen2 < 1e-8) {
                const dx = px - ax;
                const dy = py - ay;
                const d = Math.sqrt(dx * dx + dy * dy);
                return { d, nx: d > 1e-6 ? dx / d : 0, ny: d > 1e-6 ? dy / d : 0 };
            }
            let t = ((px - ax) * abx + (py - ay) * aby) / abLen2;
            t = Math.max(0, Math.min(1, t));
            const qx = ax + t * abx;
            const qy = ay + t * aby;
            const dx = px - qx;
            const dy = py - qy;
            const d = Math.sqrt(dx * dx + dy * dy);
            return { d, nx: d > 1e-6 ? dx / d : 0, ny: d > 1e-6 ? dy / d : 0 };
        }

        (function trailSmoothLoop() {
            requestAnimationFrame(trailSmoothLoop);
            if (document.hidden || fxOff) return;
            const rect = canvas.getBoundingClientRect();
            if (mouse.x != null && mouse.y != null) {
                const tx = mouse.x - rect.left;
                const ty = mouse.y - rect.top;
                if (trailX == null || trailY == null) {
                    trailX = tx;
                    trailY = ty;
                } else {
                    trailX += (tx - trailX) * 0.18;
                    trailY += (ty - trailY) * 0.18;
                }
            }
        })();

        function sampleLogoPoints(imageData, size, threshold, step) {
            const out = [];
            for (let y = 0; y < size; y += step) {
                for (let x = 0; x < size; x += step) {
                    const i = ((y * size + x) * 4);
                    const a = imageData[i + 3];
                    if (a > threshold) {
                        const r = imageData[i];
                        const g = imageData[i + 1];
                        const b = imageData[i + 2];
                        out.push({ x, y, r, g, b });
                    }
                }
            }
            return out;
        }

        function downsamplePoints(points, maxN) {
            if (points.length <= maxN) return points;
            const step = Math.ceil(points.length / maxN);
            const res = [];
            for (let i = 0; i < points.length; i += step) res.push(points[i]);
            return res;
        }

        const logoImg = new Image();
        logoImg.src = hexoRoot + 'logo.png';
        logoImg.onload = function () {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            const size = 200;
            tempCanvas.width = size;
            tempCanvas.height = size;
            tempCtx.drawImage(logoImg, 0, 0, size, size);
            const imageData = tempCtx.getImageData(0, 0, size, size).data;

            const scale = Math.min(1.45, (canvas.width / size) * 0.92);
            const blockW = size * scale;
            const blockH = size * scale;
            const offsetX = (canvas.width - blockW) / 2;
            const offsetY = Math.max(8, canvas.height - blockH - 6);

            const maxPts = prtsLowFx ? 1100 : 2400;
            let pts = sampleLogoPoints(imageData, size, 200, prtsLowFx ? 3 : 2);
            if (pts.length < 120) pts = sampleLogoPoints(imageData, size, 160, prtsLowFx ? 3 : 2);
            pts = downsamplePoints(pts, maxPts);

            class Particle {
                constructor(px, py, cr, cg, cb) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.baseX = px;
                    this.baseY = py;
                    this.cr = cr;
                    this.cg = cg;
                    this.cb = cb;
                    this.density = (Math.random() * 6) + 14;
                }
                draw() {
                    const k = 1.22;
                    const rr = Math.min(255, Math.round(this.cr * k + 12));
                    const gg = Math.min(255, Math.round(this.cg * k + 18));
                    const bb = Math.min(255, Math.round(this.cb * k + 22));
                    ctx.fillStyle = 'rgb(' + rr + ',' + gg + ',' + bb + ')';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, prtsLowFx ? 1.12 : 1.32, 0, Math.PI * 2);
                    ctx.fill();
                }
                updateSeg(ax, ay, bx, by, R) {
                    const { d, nx, ny } = distParticleToSegment(this.x, this.y, ax, ay, bx, by);
                    if (d < R && d > 1e-4) {
                        const force = (R - d) / R;
                        const f = force * this.density * 0.38;
                        this.x += nx * f;
                        this.y += ny * f;
                    } else {
                        this.x += (this.baseX - this.x) * 0.11;
                        this.y += (this.baseY - this.y) * 0.11;
                    }
                }
            }

            particles = pts.map(p => new Particle(
                p.x * scale + offsetX,
                p.y * scale + offsetY,
                p.r, p.g, p.b
            ));

            let logoLast = 0;
            const logoFrameMs = prtsLowFx ? 48 : 22;
            function animateLogo(now) {
                requestAnimationFrame(animateLogo);
                if (document.hidden) return;
                if (now - logoLast < logoFrameMs) return;
                logoLast = now;
                const bx = trailX;
                const by = trailY;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (bx == null || by == null) {
                    particles.forEach(p => {
                        p.x += (p.baseX - p.x) * 0.11;
                        p.y += (p.baseY - p.y) * 0.11;
                        p.draw();
                    });
                    return;
                }
                const ax = prevTrailX != null ? prevTrailX : bx;
                const ay = prevTrailY != null ? prevTrailY : by;
                prevTrailX = bx;
                prevTrailY = by;
                particles.forEach(p => {
                    p.updateSeg(ax, ay, bx, by, repelRadius);
                    p.draw();
                });
            }
            requestAnimationFrame(animateLogo);
            console.log('PRTS: Logo particles (color):', particles.length);
        };
        logoImg.onerror = function () {
            console.warn('PRTS: logo.png 加载失败，跳过侧栏形状粒子');
        };

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
    }

    // ================= 5. 代码块：复制 + 横向滚动（兼容 figure.highlight） =================
    function enhanceCodeBlocks(root) {
        const scope = root || document;
        scope.querySelectorAll('.post-content figure.highlight').forEach(fig => {
            if (fig.closest('.code-block-wrap')) return;
            const wrap = document.createElement('div');
            wrap.className = 'code-block-wrap';
            const bar = document.createElement('div');
            bar.className = 'code-toolbar';
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'code-copy-btn';
            btn.textContent = '复制';
            btn.addEventListener('click', () => {
                const t = (fig.innerText || '').replace(/\n+$/, '');
                navigator.clipboard.writeText(t).then(() => {
                    btn.textContent = '已复制';
                    setTimeout(() => { btn.textContent = '复制'; }, 1400);
                }).catch(() => { btn.textContent = '失败'; });
            });
            bar.appendChild(btn);
            fig.parentNode.insertBefore(wrap, fig);
            wrap.appendChild(bar);
            wrap.appendChild(fig);
        });
        scope.querySelectorAll('.post-content > pre').forEach(pre => {
            if (pre.closest('.code-block-wrap') || pre.closest('figure.highlight')) return;
            const wrap = document.createElement('div');
            wrap.className = 'code-block-wrap';
            const bar = document.createElement('div');
            bar.className = 'code-toolbar';
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'code-copy-btn';
            btn.textContent = '复制';
            btn.addEventListener('click', () => {
                const t = (pre.innerText || '').replace(/\n+$/, '');
                navigator.clipboard.writeText(t).then(() => {
                    btn.textContent = '已复制';
                    setTimeout(() => { btn.textContent = '复制'; }, 1400);
                }).catch(() => { btn.textContent = '失败'; });
            });
            bar.appendChild(btn);
            pre.parentNode.insertBefore(wrap, pre);
            wrap.appendChild(bar);
            wrap.appendChild(pre);
        });
    }
    enhanceCodeBlocks(document);

    // ================= 6. 首页封面图：极端尺寸则隐藏横幅 =================
    document.querySelectorAll('img[data-cover-watch]').forEach(img => {
        function check() {
            const w = img.naturalWidth;
            const h = img.naturalHeight;
            if (!w || !h) return;
            const ar = h / w;
            if (w > 4400 || h > 3200 || ar > 2.25 || ar < 0.12) {
                const wrap = img.closest('.ak-card-banner-wrap');
                if (wrap) wrap.style.display = 'none';
            }
        }
        if (img.complete) check();
        else img.addEventListener('load', check, { once: true });
        img.addEventListener('error', () => {
            const wrap = img.closest('.ak-card-banner-wrap');
            if (wrap) wrap.style.display = 'none';
        }, { once: true });
    });
});
</script>
